# ============================================================
# PAPERCLIP STACK — Multi-agent AI orchestration
# Services: Paperclip, Gitea, Postgres, Redis, Mem0, Chroma, Playwright
# ============================================================

services:

  # ── INFRASTRUCTURE ──────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - max_connections=200
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stack-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stack-network

  # ── GIT ────────────────────────────────────────────────────

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea_db
      GITEA__database__USER: ${POSTGRES_ADMIN_USER:-admin}
      GITEA__database__PASSWD: ${POSTGRES_ADMIN_PASSWORD}
      GITEA__server__ROOT_URL: http://localhost:3000
      GITEA__server__SSH_PORT: "2222"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__security__SECRET_KEY: ${GITEA_SECRET_KEY:?Set GITEA_SECRET_KEY}
      GITEA__security__INTERNAL_TOKEN: ${GITEA_INTERNAL_TOKEN:?Set GITEA_INTERNAL_TOKEN}
      GITEA__webhook__ALLOWED_HOST_LIST: "*"
    volumes:
      - gitea_data:/data
    ports:
      - "3000:3000"
      - "2222:22"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stack-network

  # ── AI / MEMORY ────────────────────────────────────────────

  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    networks:
      - stack-network

  mem0:
    build:
      context: ./configs/mem0
    container_name: mem0
    restart: unless-stopped
    environment:
      MEM0_CONFIG: /app/config.yaml
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TRANSFORMERS_CACHE: /app/hf_cache
      HF_HOME: /app/hf_cache
    volumes:
      - mem0_data:/app/data
      - mem0_hf_cache:/app/hf_cache
      - ./configs/mem0/config.yaml:/app/config.yaml:ro
    ports:
      - "8050:8050"
    depends_on:
      - chroma
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8050/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - stack-network

  # ── BROWSER AUTOMATION ─────────────────────────────────────

  playwright:
    image: mcr.microsoft.com/playwright:v1.49.0-noble
    container_name: playwright
    restart: unless-stopped
    working_dir: /tests
    volumes:
      - playwright_tests:/tests
      - playwright_results:/results
    environment:
      CI: "true"
    command: ["node", "/tests/playwright-api.js"]
    networks:
      - stack-network

  firecrawl-playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    container_name: firecrawl-playwright
    restart: unless-stopped
    environment:
      PORT: "3000"
    networks:
      - stack-network

  # ── PAPERCLIP (agent orchestrator) ─────────────────────────

  paperclip:
    build:
      context: ./paperclip-repo
    container_name: paperclip
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_ADMIN_USER:-admin}:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/paperclip_db
      BETTER_AUTH_SECRET: ${PAPERCLIP_AUTH_SECRET:?Set PAPERCLIP_AUTH_SECRET}
      PAPERCLIP_PUBLIC_URL: http://localhost:3100
      PAPERCLIP_ALLOWED_HOSTNAMES: localhost
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:3100
      CLAUDE_CONFIG_DIR: /claude-config
      MEM0_URL: http://mem0:8050
      GITEA_URL: http://gitea:3000
      GITEA_API_TOKEN: ${GITEA_API_TOKEN}
      PAPERCLIP_AGENT_JWT_SECRET: ${PAPERCLIP_AGENT_JWT_SECRET:?Set PAPERCLIP_AGENT_JWT_SECRET}
      PAPERCLIP_ADMIN_EMAIL: ${PAPERCLIP_ADMIN_EMAIL:-admin@paperclip.local}
      PAPERCLIP_ADMIN_PASSWORD: ${PAPERCLIP_ADMIN_PASSWORD:?Set PAPERCLIP_ADMIN_PASSWORD}
      PAPERCLIP_ADMIN_NAME: ${PAPERCLIP_ADMIN_NAME:-Admin}
      # Dokploy integration for preview deployments
      DOKPLOY_API_URL: ${DOKPLOY_API_URL:-}
      DOKPLOY_API_TOKEN: ${DOKPLOY_API_TOKEN:-}
      DOKPLOY_WEBHOOK_URL: ${DOKPLOY_WEBHOOK_URL:-}
      DOKPLOY_DOMAIN: ${DOKPLOY_DOMAIN:-}
    entrypoint: ["/bin/sh", "-c", "sh /app/init-admin.sh & exec node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js"]
    volumes:
      - paperclip_data:/paperclip
      - ./init-admin.sh:/app/init-admin.sh:ro
      - ~/.claude-config:/claude-config
    ports:
      - "3100:3100"
    depends_on:
      postgres:
        condition: service_healthy
      mem0:
        condition: service_healthy
    networks:
      - stack-network

volumes:
  postgres_data:
  redis_data:
  gitea_data:
  chroma_data:
  mem0_data:
  mem0_hf_cache:
  paperclip_data:
  playwright_tests:
  playwright_results:

networks:
  stack-network:
    name: stack-network
    driver: bridge
